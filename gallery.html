<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWx — Full archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0b0b0a; --black-2:#141311;
    --bone:#ede7dc; --bone-dim:#c9c3b6;
    --oxblood:#6e1423; --oxblood-bright:#9a1f30;
    --brass:#a47b3f; --gray:#8c877d;
    --line:rgba(237,231,220,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--bone);font-family:'Inter',sans-serif;line-height:1.6;}
  img,video{display:block;max-width:100%;height:auto;}
  a{color:inherit;text-decoration:none;}
  .eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--brass);}
  h1,h2{font-family:'Bodoni Moda',serif;font-weight:500;letter-spacing:-0.01em;}

  /* nav */
  nav{
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 40px;
    background:rgba(11,11,10,0.92);backdrop-filter:blur(10px);
    border-bottom:0.5px solid var(--line);
  }
  .nav-mark{font-family:'Bodoni Moda',serif;font-size:20px;font-weight:600;}
  .nav-mark em{color:var(--oxblood-bright);font-style:italic;}
  .back-link{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--bone-dim);}
  .back-link:hover{color:var(--bone);}

  /* header */
  header{padding:80px 40px 40px;max-width:1240px;margin:0 auto;}
  header h1{font-size:clamp(36px,6vw,64px);margin:16px 0 10px;}
  header p{color:var(--bone-dim);max-width:520px;font-size:15px;}

  /* filters */
  .filters{
    display:flex;gap:10px;flex-wrap:wrap;
    padding:0 40px 40px;max-width:1240px;margin:0 auto;
  }
  .filter-btn{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
    padding:10px 18px;border:0.5px solid var(--bone-dim);color:var(--bone-dim);
    background:transparent;cursor:pointer;transition:all .25s ease;
  }
  .filter-btn:hover{border-color:var(--bone);color:var(--bone);}
  .filter-btn.active{background:var(--bone);color:var(--black);border-color:var(--bone);}
  .count{color:var(--gray);font-size:11px;margin-left:6px;}

  /* masonry grid */
  .grid-wrap{max-width:1240px;margin:0 auto;padding:0 40px 60px;}
  .grid{
    column-count:4;
    column-gap:16px;
  }
  @media (max-width:1100px){ .grid{column-count:3;} }
  @media (max-width:760px){ .grid{column-count:2;} .grid-wrap,.filters,header{padding-left:20px;padding-right:20px;} nav{padding-left:20px;padding-right:20px;} }
  @media (max-width:460px){ .grid{column-count:1;} }

  .tile{
    break-inside:avoid;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
    background:var(--black-2);
    cursor:pointer;
    opacity:0;
    transform:translateY(16px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .tile.in-view{opacity:1;transform:translateY(0);}
  .tile img,.tile video{width:100%;height:auto;display:block;transition:transform .6s cubic-bezier(.2,.7,.2,1);}
  .tile:hover img,.tile:hover video{transform:scale(1.04);}
  .tile .tag{
    position:absolute;top:10px;left:10px;
    font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
    background:rgba(11,11,10,0.7);color:var(--bone-dim);
    padding:5px 9px;border:0.5px solid var(--line);
  }
  .tile .play-icon{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .tile .play-icon::before{
    content:'';width:0;height:0;
    border-top:9px solid transparent;border-bottom:9px solid transparent;
    border-left:15px solid var(--bone);
    margin-left:4px;
  }
  .tile .play-icon{
    width:46px;height:46px;border-radius:50%;
    background:rgba(11,11,10,0.55);border:0.5px solid var(--line);
    margin:auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  }

  .sentinel{height:1px;}
  .load-more-note{
    text-align:center;padding:30px 0 60px;
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--gray);
  }

  /* lightbox */
  .lightbox{
    position:fixed;inset:0;z-index:200;
    background:rgba(11,11,10,0.97);
    display:none;align-items:center;justify-content:center;
    padding:40px;
  }
  .lightbox.open{display:flex;}
  .lightbox-media{max-width:min(90vw,900px);max-height:82vh;}
  .lightbox-media img,.lightbox-media video{max-width:100%;max-height:82vh;width:auto;margin:0 auto;}
  .lightbox-close,.lightbox-prev,.lightbox-next{
    position:absolute;background:none;border:0.5px solid var(--line);color:var(--bone);
    cursor:pointer;font-family:'Space Mono',monospace;font-size:14px;
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    transition:all .25s ease;
  }
  .lightbox-close:hover,.lightbox-prev:hover,.lightbox-next:hover{background:var(--bone);color:var(--black);}
  .lightbox-close{top:24px;right:24px;}
  .lightbox-prev{left:24px;top:50%;transform:translateY(-50%);}
  .lightbox-next{right:24px;top:50%;transform:translateY(-50%);}
  .lightbox-caption{
    position:absolute;bottom:24px;left:0;right:0;text-align:center;
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--bone-dim);
  }
  @media (max-width:640px){
    .lightbox-prev,.lightbox-next{width:38px;height:38px;}
    .lightbox{padding:16px;}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-mark">RAW<em>x</em></div>
  <a href="index.html" class="back-link">&larr; Back to studio</a>
</nav>

<header>
  <span class="eyebrow">Full archive</span>
  <h1>Every piece, on record</h1>
  <p>The complete RAWx image and video archive — product detail, lookbook, and campaign. New drops appear here automatically.</p>
</header>

<div class="filters" id="filters"></div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="sentinel" id="sentinel"></div>
  <div class="load-more-note" id="loadNote"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">&times;</button>
  <button class="lightbox-prev" id="lbPrev">&larr;</button>
  <div class="lightbox-media" id="lbMedia"></div>
  <button class="lightbox-next" id="lbNext">&rarr;</button>
  <div class="lightbox-caption" id="lbCaption"></div>
</div>

<script src="assets/manifest.js"></script>
<script>
  const IMG_DIR = 'assets/images/';
  const VID_DIR = 'assets/videos/';
  const BATCH_SIZE = 24;

  const ALL_ITEMS = [
    ...IMAGE_ITEMS.map(it => ({...it, type:'image'})),
    ...VIDEO_ITEMS.map(it => ({...it, type:'video'}))
  ];

  let activeFilter = 'all';
  let renderedCount = 0;
  let visibleItems = ALL_ITEMS;

  // ---------- filters ----------
  function buildFilters(){
    const collections = ['all', ...new Set(ALL_ITEMS.map(i => i.collection))];
    const wrap = document.getElementById('filters');
    wrap.innerHTML = '';
    collections.forEach(c => {
      const label = c === 'all' ? 'All' : (CATEGORY_LABELS[c] || c);
      const count = c === 'all' ? ALL_ITEMS.length : ALL_ITEMS.filter(i => i.collection === c).length;
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (c === 'all' ? ' active' : '');
      btn.dataset.collection = c;
      btn.innerHTML = `${label}<span class="count">${count}</span>`;
      btn.addEventListener('click', () => setFilter(c));
      wrap.appendChild(btn);
    });
  }

  function setFilter(c){
    activeFilter = c;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.collection === c));
    visibleItems = c === 'all' ? ALL_ITEMS : ALL_ITEMS.filter(i => i.collection === c);
    renderedCount = 0;
    document.getElementById('grid').innerHTML = '';
    renderNextBatch();
  }

  // ---------- media element with extension fallback ----------
  function buildMediaEl(item){
    if (item.type === 'video'){
      const v = document.createElement('video');
      v.src = VID_DIR + encodeURIComponent(item.base) + '.' + item.ext[0];
      v.muted = true; v.loop = true; v.playsInline = true; v.preload = 'metadata';
      v.addEventListener('mouseenter', () => v.play().catch(()=>{}));
      v.addEventListener('mouseleave', () => v.pause());
      return v;
    }
    const img = document.createElement('img');
    img.loading = 'lazy';
    let i = 0;
    const tryNext = () => {
      if (i >= item.ext.length) return;
      img.src = IMG_DIR + encodeURIComponent(item.base) + '.' + item.ext[i];
      i++;
    };
    img.addEventListener('error', tryNext);
    tryNext();
    img.alt = item.base.replace(/[()]/g,'').trim();
    return img;
  }

  // ---------- grid rendering ----------
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
  }, { threshold: 0.1 });

  function renderNextBatch(){
    const grid = document.getElementById('grid');
    const slice = visibleItems.slice(renderedCount, renderedCount + BATCH_SIZE);
    slice.forEach(item => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const media = buildMediaEl(item);
      tile.appendChild(media);
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = CATEGORY_LABELS[item.collection] || item.collection;
      tile.appendChild(tag);
      if (item.type === 'video'){
        const play = document.createElement('span');
        play.className = 'play-icon';
        tile.appendChild(play);
      }
      tile.addEventListener('click', () => openLightbox(visibleItems.indexOf(item)));
      grid.appendChild(tile);
      observer.observe(tile);
    });
    renderedCount += slice.length;
    const note = document.getElementById('loadNote');
    note.textContent = renderedCount < visibleItems.length
      ? `Loaded ${renderedCount} of ${visibleItems.length} — scroll for more`
      : `${visibleItems.length} pieces`;
  }

  const sentinelObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && renderedCount < visibleItems.length) renderNextBatch();
  }, { rootMargin: '400px' });
  sentinelObserver.observe(document.getElementById('sentinel'));

  // ---------- lightbox ----------
  const lightbox = document.getElementById('lightbox');
  const lbMedia = document.getElementById('lbMedia');
  const lbCaption = document.getElementById('lbCaption');
  let lbIndex = 0;

  function openLightbox(index){
    lbIndex = index;
    renderLightboxMedia();
    lightbox.classList.add('open');
  }
  function renderLightboxMedia(){
    const item = visibleItems[lbIndex];
    lbMedia.innerHTML = '';
    if (item.type === 'video'){
      const v = document.createElement('video');
      v.src = VID_DIR + encodeURIComponent(item.base) + '.' + item.ext[0];
      v.controls = true; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
      lbMedia.appendChild(v);
      v.play().catch(()=>{});
    } else {
      const img = document.createElement('img');
      let i = 0;
      const tryNext = () => { if (i < item.ext.length){ img.src = IMG_DIR + encodeURIComponent(item.base) + '.' + item.ext[i]; i++; } };
      img.addEventListener('error', tryNext);
      tryNext();
      lbMedia.appendChild(img);
    }
    lbCaption.textContent = `${item.base.replace(/[()]/g,'').trim()} — ${CATEGORY_LABELS[item.collection] || item.collection} — ${lbIndex+1} / ${visibleItems.length}`;
  }
  document.getElementById('lbClose').addEventListener('click', () => lightbox.classList.remove('open'));
  document.getElementById('lbPrev').addEventListener('click', () => { lbIndex = (lbIndex - 1 + visibleItems.length) % visibleItems.length; renderLightboxMedia(); });
  document.getElementById('lbNext').addEventListener('click', () => { lbIndex = (lbIndex + 1) % visibleItems.length; renderLightboxMedia(); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') lightbox.classList.remove('open');
    if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
  });

  // ---------- init ----------
  buildFilters();
  renderNextBatch();
</script>

</body>
</html>
